services:
  # Backend API
  - type: web
    name: moveit-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false # User must set this manually in Render dashboard
      - key: FRONTEND_URL
        value: https://moveit-app.onrender.com

  # Frontend Static Site
  - type: web
    name: moveit-app
    env: static
    staticPublishPath: ./
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
