services:
  # Backend API (Node.js)
  - type: web
    name: moveit-api
    runtime: node
    plan: free # Try 'free' again, if it fails, Render might require manual selection
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: FRONTEND_URL
        value: https://moveit-app.onrender.com

  # Frontend Static Site
  - type: web
    name: moveit-app
    runtime: static
    staticPublishPath: ./
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
